<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Multiplayer P2P</title>
    <link rel="stylesheet" href="style.css">
    <!-- PeerJS per connessione diretta in tempo reale senza server dedicati -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>♣️ Blackjack Casino ♥️</h1>
        
        <!-- Schermata di Connessione (Lobby) -->
        <div id="lobby" class="panel">
            <h2>Lobby di Ingresso</h2>
            <div class="lobby-controls">
                <div class="control-group">
                    <button id="btn-host" onclick="startHost()">Crea Nuovo Tavolo (Host)</button>
                    <p id="host-id-display" class="highlight-text"></p>
                    <button id="btn-copy-link" style="display:none;" onclick="copyInviteLink()">🔗 Copia Link di Invito</button>
                </div>
                <div class="divider" id="lobby-divider">oppure</div>
                <div class="control-group" id="join-group">
                    <input type="text" id="join-id" placeholder="Inserisci ID Tavolo">
                    <button id="btn-join" onclick="joinGame()">Siediti al Tavolo</button>
                </div>
            </div>
            
            <div id="player-list-container" style="display:none; margin-top: 20px;">
                <h3>Giocatori al Tavolo:</h3>
                <ul id="player-list"></ul>
                
                <div id="host-budget-selection" style="margin-bottom: 15px;">
                    <label for="select-initial-budget" style="color: #ffd700; font-weight: bold;">Budget Iniziale per tutti: </label>
                    <select id="select-initial-budget" style="padding: 5px; border-radius: 4px;">
                        <option value="10">10 €</option>
                        <option value="100" selected>100 €</option>
                        <option value="1000">1000 €</option>
                    </select>
                </div>
                
                <button id="btn-start-game" style="display:none;" onclick="startGame()">Inizia Partita</button>
            </div>
        </div>

        <!-- Tavolo da Gioco -->
        <div id="table" class="panel" style="display: none;">
            <!-- Notifica Globale Condivisa -->
            <div id="global-notification" class="notification-banner" style="display: none;"></div>

            <div id="turn-indicator">In attesa dell'Host...</div>
            
            <div class="game-layout">
                <!-- Area Principale del Panno Verde -->
                <div class="play-area">
                    
                    <!-- AREA DEL BANCO -->
                    <div class="dealer-area">
                        <h3>BANCO</h3>
                        <div id="dealer-score-display" class="score-badge">Punti: --</div>
                        <div id="dealer-cards" class="card-row"></div>
                    </div>
                    
                    <hr class="table-divider">

                    <!-- AREA DI FASE PUNTATA (VIRTUAL BETTING) -->
                    <div id="betting-area" class="betting-box" style="display: none;">
                        <h3>Inserisci la tua Puntata Virtuale:</h3>
                        <p style="font-size: 14px; color: #aaa; margin-top: 0;">Disponibili: <span id="available-budget-display" style="color: #ffd700; font-weight: bold;">0</span>€</p>
                        <div class="bet-input-container">
                            <input type="number" id="input-bet-amount" min="1" step="1" placeholder="Es. 25" style="padding: 10px; border-radius: 6px; border: none; width: 120px; text-align: center; font-size: 16px;">
                            <button onclick="submitBet()" style="margin-left: 10px;">PUNTA</button>
                        </div>
                    </div>

                    <!-- AREA DEL GIOCATORE LOCALE (TU) -->
                    <div class="personal-area">
                        <h3>Il Tuo Spazio (<span id="my-name-display"></span>)</h3>
                        <div id="my-score-display" class="score-badge">Punti: 0 | Puntata: --</div>
                        
                        <div class="deck-area">
                            <button id="btn-hit" onclick="playerHit()" disabled>CARTA (HIT)</button>
                            <button id="btn-stand" onclick="playerStand()" disabled>STAI (STAND)</button>
                        </div>
                        
                        <div id="my-cards" class="card-row"></div>
                    </div>

                    <!-- ALTRI GIOCATORI CONNESSI -->
                    <div class="opponents-container">
                        <h3>Altri Giocatori al Tavolo</h3>
                        <div id="opponents-row" class="opponents-grid"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
